services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    gpus: all

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    ports:
      - "12000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "false"
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

  claude-code:
    image: node:20-alpine  # lightweight base with Node
    container_name: claude-code
    working_dir: /workspace
    volumes:
      - ${HOME}/Code:/workspace  # mount my code dir
      - /var/run/docker.sock:/var/run/docker.sock  # Optional: for exec perms
    environment:
      - ANTHROPIC_BASE_URL=http://ollama:11434/v1
      - ANTHROPIC_AUTH_TOKEN=ollama
      - ANTHROPIC_API_KEY=
      - ANTHROPIC_MODEL=qwen3-coder  # preferred local model
    command: >
      sh -c "
        npm install -g @anthropic-ai/sdk claude-code &&
        cd /workspace &&
        claude
      "
    depends_on:
      - ollama
    restart: unless-stopped
    stdin_open: true
    tty: true  # for interactive Claude Code session
    networks:
      - default  # use the same network as Ollama/OpenWebUI

volumes:
  ollama:
  open-webui:
networks:
  default:
