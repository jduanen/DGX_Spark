services:
  # Primary high-performance LLM server for HuggingFace/FP8 models (OpenAI-compatible API)
  vllm:
    image: nvcr.io/nvidia/vllm:${VLLM_VERSION:-26.03-py3}
    container_name: vllm
    ports:
      - "8000:8000"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /models
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - /home/jdn/Data/vLLMModels:/models
    command: >
      python3 -m vllm.entrypoints.openai.api_server
      --model ${VLLM_MODEL:-nvidia/Llama-3.1-8B-Instruct-FP8}
      --served-model-name ${VLLM_SERVED_NAME:-llama-3.1-8b}
      --trust-remote-code
      --tensor-parallel-size ${TENSOR_PARALLEL_SIZE:-1}
      --max-model-len ${MAX_MODEL_LEN:-32768}
      --gpu-memory-utilization ${GPU_MEM_UTIL:-0.85}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Secondary LLM server for GGUF-format models not supported by vLLM
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    ports:
      - "12000:8080"
    environment:
      # Ollama backend (GGUF models)
      OLLAMA_BASE_URL: http://ollama:11434
      # vLLM backend (HF/FP8 models, OpenAI-compatible)
      OPENAI_API_BASE_URLS: http://vllm:8000/v1
      OPENAI_API_KEYS: vllm
      WEBUI_AUTH: "false"
      AUTH_MODE: none
      STATIC_USERNAME: admin
      STATIC_PASSWORD: xyzzy
      DISABLE_TELEMETRY: 1
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
      - vllm
    restart: unless-stopped

volumes:
  ollama:
  open-webui:
networks:
  default:
